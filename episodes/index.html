<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ByteCast Episodes</title>
  <meta http-equiv="refresh" content="0; url=../seed_bytecast.html">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg0: #050607;
      --bg1: #0b0f14;
      --ink: rgba(255, 255, 255, 0.93);
      --muted: rgba(255, 255, 255, 0.7);
      --line: rgba(255, 255, 255, 0.14);
      --accent: #22a7ff;
      --max: 760px;
      --pad: clamp(20px, 4vw, 32px);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--pad);
      font-family: ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 480px at 10% 0%, rgba(34, 167, 255, 0.14), transparent),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    .card {
      width: min(100%, var(--max));
      padding: clamp(22px, 4vw, 34px);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.26);
    }
    .eyebrow {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
    }
    p {
      margin: 0;
      line-height: 1.65;
      color: var(--muted);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--ink);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.04);
    }
    .btn--primary {
      border-color: rgba(34, 167, 255, 0.4);
      background: rgba(34, 167, 255, 0.12);
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">ByteCast</p>
    <h1>Episode links now start from the Playlist.</h1>
    <p>You are being redirected to the main ByteCast learning entry so it is easier to resume the right journey, mission, or episode.</p>
    <div class="actions">
      <a class="btn btn--primary" href="../seed_bytecast.html">Open Playlist</a>
      <a class="btn" href="../index.html">Workspace Entry</a>
    </div>
  </main>
</body>
</html>
